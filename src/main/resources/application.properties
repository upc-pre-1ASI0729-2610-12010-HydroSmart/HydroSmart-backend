# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hydrosmart_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=hydrosmart-256-bit-secret-key-para-firmar-tokens-jwt-2025
jwt.expiration-ms=86400000

# Server
server.port=8080
spring.mvc.pathmatch.use-suffix-pattern=false

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
