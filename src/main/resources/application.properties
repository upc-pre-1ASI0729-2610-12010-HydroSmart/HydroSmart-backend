# =========================================================
# DATASOURCE — PostgreSQL
# En local usa los defaults de abajo (Postgres local en :5432).
# En Render, las variables de entorno SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD
# sobreescriben estos valores automáticamente (Spring Boot
# las mapea solo, no hace falta tocar este archivo).
# =========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hydrosmart_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Hibernate detecta el dialect de Postgres automáticamente,
# no hace falta especificarlo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT — en Render, sobreescribe JWT_SECRET con un valor propio
# y secreto (Environment > Add Environment Variable).
jwt.secret=${JWT_SECRET:hydrosmart-256-bit-secret-key-para-firmar-tokens-jwt-2025}
jwt.expiration-ms=86400000

# Server — Render inyecta la variable PORT automáticamente.
# En local, si PORT no existe, usa 8080 por defecto.
server.port=${PORT:8080}
spring.mvc.pathmatch.use-suffix-pattern=false

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# CORS — origen permitido del frontend en producción.
# En Render, sobreescribe FRONTEND_URL con la URL real una vez
# que despliegues el frontend (ej: https://hydrosmart.vercel.app).
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:4200}