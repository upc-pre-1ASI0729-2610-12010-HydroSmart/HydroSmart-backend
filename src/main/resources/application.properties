# =========================================================
# DATASOURCE — PostgreSQL
# En local usa los defaults de abajo (Postgres local en :5432).
# En Render (vía Blueprint/render.yaml), las variables DB_HOST,
# DB_PORT, DB_NAME, DB_USER y DB_PASSWORD se inyectan automáticamente
# desde la base de datos vinculada — no hace falta tocar nada aquí.
# =========================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hydrosmart_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Hibernate detecta el dialect de Postgres automáticamente,
# no hace falta especificarlo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT — en Render, el Blueprint genera un valor aleatorio automáticamente
# (generateValue: true en render.yaml). En local usa el default de abajo.
jwt.secret=${JWT_SECRET:hydrosmart-256-bit-secret-key-para-firmar-tokens-jwt-2025}
jwt.expiration-ms=86400000

# Server — Render inyecta la variable PORT automáticamente.
# En local, si PORT no existe, usa 8080 por defecto.
server.port=${PORT:8080}
spring.mvc.pathmatch.use-suffix-pattern=false

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# CORS — origen permitido del frontend en producción.
# En Render, actualiza la variable FRONTEND_URL en el dashboard
# una vez que despliegues el frontend (ej: https://hydrosmart.vercel.app).
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:4200}