# =========================================================
# PROFILE LOCAL (demo) — se activa con: -Dspring.profiles.active=demo
# Usa H2 en memoria en lugar de PostgreSQL para poder levantar
# el backend sin instalar nada. NO afecta a la configuración de
# Render/Postgres (esa vive en application.properties).
# =========================================================
spring.datasource.url=jdbc:h2:mem:hydrosmart_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Permitir ejecutar los seeders al arrancar
spring.jpa.defer-datasource-initialization=false
